<!--
  SORRISO PRIME — MODAL DE AGENDAMENTO (standalone reference)
  Este modal está integrado no index.html. Arquivo de referência.
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Agendamento — Sorriso Prime</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    body { background: rgba(0,0,0,0.5); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .modal-overlay { position: static; opacity: 1; pointer-events: all; }
  </style>
</head>
<body>

<!-- Modal Agendamento Rápido (triggered by nav CTA and hero buttons) -->
<div class="modal-overlay active" id="modal-agendamento" role="dialog" aria-modal="true" aria-labelledby="modal-agendar-title">
  <div class="modal-box" style="max-width: 480px;">

    <div class="modal-header">
      <h2 class="modal-title" id="modal-agendar-title">Agendar Consulta</h2>
      <button class="modal-close" aria-label="Fechar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="modal-body">
      <p style="font-size: 0.88rem; color: var(--color-gray); margin-bottom: 1.5rem;">
        Preencha os dados abaixo e enviaremos sua solicitação pelo WhatsApp.
      </p>

      <form id="form-agendamento-modal" novalidate>
        <div style="display: flex; flex-direction: column; gap: 1rem;">

          <div class="form-group">
            <label class="form-label" for="modal-campo-nome">Nome completo</label>
            <input type="text" id="modal-campo-nome" class="form-input" placeholder="Seu nome" autocomplete="name" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="modal-campo-telefone">Telefone / WhatsApp</label>
            <input type="tel" id="modal-campo-telefone" class="form-input" placeholder="(85) 99999-0001" inputmode="tel" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="modal-campo-servico">Serviço desejado</label>
            <div class="form-select-wrap">
              <select id="modal-campo-servico" class="form-select">
                <option value="">Selecione um serviço</option>
                <option value="clareamento">Clareamento Dental</option>
                <option value="ortodontia">Ortodontia Invisível</option>
                <option value="implante">Implante Dental</option>
                <option value="lente">Lente de Contato Dental</option>
                <option value="canal">Tratamento de Canal</option>
                <option value="limpeza">Limpeza e Prevenção</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="modal-campo-data">Data preferida</label>
            <input type="date" id="modal-campo-data" class="form-input">
          </div>

          <div class="form-group">
            <label class="form-label" for="modal-campo-horario">Horário preferido</label>
            <div class="form-select-wrap">
              <select id="modal-campo-horario" class="form-select">
                <option value="">Selecione</option>
                <option value="08:00">08:00</option>
                <option value="09:00">09:00</option>
                <option value="10:00">10:00</option>
                <option value="11:00">11:00</option>
                <option value="14:00">14:00</option>
                <option value="15:00">15:00</option>
                <option value="16:00">16:00</option>
                <option value="17:00">17:00</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn btn-gold" style="width: 100%; justify-content: center;">
            Confirmar pelo WhatsApp
          </button>

        </div>
      </form>

    </div>
  </div>
</div>

</body>
</html>
